version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/danjdewhurst/envio/internal/version.Version={{.Version}}
      - -X github.com/danjdewhurst/envio/internal/version.Commit={{.Commit}}
      - -X github.com/danjdewhurst/envio/internal/version.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

changelog:
  disable: true
